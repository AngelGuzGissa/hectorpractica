<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proximamente</title>

    <style>
        body{
            background-color: #d0c9;
            font-family: Tahoma;
            font-size: 12px;
            min-width: 599px;
            background: transparent url(https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/06bbe046-3dfc-4690-8707-e9989f0221d8/dddt4du-1a26f30e-0456-4bb8-81c3-4ba01794e3fb.png/v1/fill/w_1920,h_1080,q_80,strp/grey_minimalist_wallpaper_by_gaikan_dddt4du-fullview.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9MTA4MCIsInBhdGgiOiJcL2ZcLzA2YmJlMDQ2LTNkZmMtNDY5MC04NzA3LWU5OTg5ZjAyMjFkOFwvZGRkdDRkdS0xYTI2ZjMwZS0wNDU2LTRiYjgtODFjMy00YmEwMTc5NGUzZmIucG5nIiwid2lkdGgiOiI8PTE5MjAifV1dLCJhdWQiOlsidXJuOnNlcnZpY2U6aW1hZ2Uub3BlcmF0aW9ucyJdfQ.tbLsGPkM7SuFm24xSWtVRB97pVjTGE86sZe1Y8bOdwk) 0 0 no-repeat;
            background-size: cover;
        }

        a{
            text-decoration: none;
            cursor: pointer;
            color: white;
        }
        a.aLink:hover{
            text-decoration: underline;
        }

        #main{
            width: 100%;
            position: relative;
            z-index: 100;
        }

        .wrap{
            width: 599px;
            margin: auto;
        }

        #header{
            padding: 70px 0;
        }

        #header h1{
            font-family: Tahoma;
            text-align: center;
            font-size: 18px;
            position: relative;
            width: 280px;
            margin: auto;
            color: white;
        }

        #header h1::before{
            content: "";
            width: 40px;
            height: 2px;
            background-color: white;
            position: absolute;
            top: 50%;
            left: 0;
        }

        #header h1::after{
            content: "";
            width: 40px;
            height: 2px;
            background-color: white;
            position: absolute;
            top: 50%;
            right: 0;
        }

        #contents{
            font-family: tahoma;
            text-align: center;
            color: white;
            padding-bottom: 35px;
            font-size: 22px;
            line-height: 30px;
            font-weight: normal;
            margin-top: -50px;
        }

        #contents h2{
            font-family: tahoma;
            font-size: 80px;
            line-height: 80px;
            font-weight: 500;
            color: white;
            line-height: 110%;
        }

        #contents .loader{
            padding: 20px 0;
        }

        #contents .loader .load{
            background-color: #313031;   
        }

        #contents .loader .load .percentage{
            background-color: white;
            height: 10px;
        }

        #contents .loader .info{
            display: flex;
            font-size: 18px;
        }

        #contents .loader .info span{
            flex: 1;
        }

        #contents .loader .info span:first-child{
            text-align: left;
        }

        #contents .loader .info span:last-child{
            text-align: right;
        }

        #footer{
            text-align: center;
            padding-bottom: 80px;
        }

        #footer .social-links{
            display: flex;
            justify-content: center;
        }

        #footer .social-links a{
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 5px;
            width: 40px;
            height: 40px;
            border: 2px solid white;
            font-size: 20px;
            border-radius: 40px;
        }

    </style>
</head>
<body>
    <div id="main">
        <header id="header">
            <div class="wrap">
                <h1>EN CONSTRUCCIÓN</h1>
            </div>
        </header>
        <section id="contents">
            <div class="wrap">
                <h2>EL SITIO ESTARÁ LISTO PRONTO</h2>
                <div class="loader">
                    <div class="load">
                        <div id="count" class="percentage" style="width: 0%;"></div>
                    </div>
                    <div class="info">
                        <span>0%</span>
                        <span id="progress">0%</span>
                        <span>100%</span>
                    </div>
                </div>
            </div>
        </section>

        <footer id="footer">
            <div class="wrap">
                <div class="social-links">
                    <span></span>
                </div>
            </div>
        </footer>
    </div>

    <script>
        var elem = document.getElementById("count");
        var width = 0;
        var id = setInterval(frame, 30);

        function frame(){
            if(width >= 100){
                width = 0;
            }else{
                width++;
                elem.style.width = width + '%';
                document.getElementById("progress").innerHTML = width * 1 + '%';
            }
        }
    </script>
</body>
</html>
